name: PR demo video

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  demo-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:screenshot
      - run: npm run demo:video
      - name: Commit PR preview screenshot
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/demo/pr-preview.png
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update PR preview screenshot"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-demo-video
          path: |
            docs/demo/pr-preview.png
            test-results/**/*.webm
            playwright-report/**
          if-no-files-found: warn
      - name: Update PR body with screenshot and video link
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          SCREENSHOT_SHA=$(git rev-parse HEAD)
          SCREENSHOT_URL="https://raw.githubusercontent.com/${REPOSITORY}/${SCREENSHOT_SHA}/docs/demo/pr-preview.png"
          BODY_FILE=$(mktemp)
          UPDATED_BODY_FILE=$(mktemp)
          gh pr view "$PR_NUMBER" --json body --jq .body > "$BODY_FILE"
          python3 - "$BODY_FILE" "$UPDATED_BODY_FILE" "$SCREENSHOT_URL" "$RUN_URL" <<'PY'
          import sys
          from pathlib import Path

          body_path, updated_body_path, screenshot_url, run_url = sys.argv[1:]
          body = Path(body_path).read_text()
          start = "<!-- centauri-demo-preview:start -->"
          end = "<!-- centauri-demo-preview:end -->"
          block = f"""{start}
## PR visual preview

![PR visual preview]({screenshot_url})

🎥 Demo video: download the `pr-demo-video` artifact from [this workflow run]({run_url}).
{end}"""
          if start in body and end in body:
            before = body.split(start, 1)[0].rstrip()
            after = body.split(end, 1)[1].lstrip()
            updated = f"{before}\n\n{block}\n\n{after}".rstrip() + "\n"
          else:
            updated = body.rstrip() + "\n\n" + block + "\n"
          Path(updated_body_path).write_text(updated)
          PY
          gh pr edit "$PR_NUMBER" --body-file "$UPDATED_BODY_FILE"
          gh pr comment "$PR_NUMBER" --body "🎥 PR demo assets updated.

The PR body now includes a still screenshot. The full video remains in the **pr-demo-video** artifact here:
$RUN_URL"
