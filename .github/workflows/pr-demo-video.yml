name: PR demo video

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  demo-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:video
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-demo-video
          path: |
            test-results/**/*.webm
            playwright-report/**
          if-no-files-found: warn
      - name: Comment with demo video artifact
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" --body "🎥 PR demo video artifact is ready.

Download it from the **pr-demo-video** artifact at the bottom of this workflow run:
$RUN_URL

GitHub does not embed Actions artifacts directly in the PR conversation, so this link is the handoff point."
