name: PR demo video

on:
  pull_request:

jobs:
  demo-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run demo:video
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-demo-video
          path: |
            test-results/**/*.webm
            playwright-report/**
          if-no-files-found: warn
