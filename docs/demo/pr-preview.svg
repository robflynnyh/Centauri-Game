<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Centauri PR preview still">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080b19"/>
      <stop offset="1" stop-color="#171430"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d4a88"/>
      <stop offset="0.45" stop-color="#9a90a3"/>
      <stop offset="1" stop-color="#595989"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7bf0cf" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ff5ea8" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#080914" flood-opacity="0.45"/>
    </filter>
